function fwdLim(w){if(w<=AFM.wBreak)return AFM.fwd31;if(w>=AFM.maxTOKg)return AFM.fwd36;return AFM.fwd31+((w-AFM.wBreak)/(AFM.maxTOKg-AFM.wBreak))*(AFM.fwd36-AFM.fwd31)}

// Input that only updates parent on blur - no fighting with typing
function SmartNum({value,onChange,disabled}){

  if(disabled)return React.createElement("input",{type:"text",value:String(value),disabled:true,

    onChange:e=>setTxt(e.target.value),

    conds.forEach(d=>{if(!d.w||!d.c||d.w<100)return;const x=tX(d.c),y=tY(d.w),cc=col[d.l]||"#333";

    ctx.beginPath();ctx.moveTo(p.l,tY(AFM.maxTOKg));ctx.lineTo(p.l+cw,tY(AFM.maxTOKg));ctx.stroke();
