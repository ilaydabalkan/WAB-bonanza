const{useState,useEffect,useRef,useCallback}=React;

// AFM Data - Beechcraft Bonanza 36/A36, SN E-500 (E-1 thru E-631)
// Source: POH/AFM P/N 36-590002-19C
const AFM={
  maxRampKg:1638.4,   // 3612 lbs
  maxTOKg:1632.9,     // 3600 lbs
  maxLdgKg:1632.9,    // 3600 lbs
  maxBagKg:181.4,     // 400 lbs (AFM Section II - Weight Limits)
  maxFuelL:280,       // 74 US gal optional system
  fd:0.72,            // avgas 100LL density kg/L
  taxiKg:5.4,         // 12 lbs start/taxi fuel
  taxiArm:75,
  fsArm:77,           // front seats arm (FS 75-79 midpoint)
  rsArm:117,          // rear seats arm (FS 115-120 midpoint)
  bagArm:150,         // baggage behind center seats
  fArm:75,            // fuel leading edge tanks
  fwd31:74.0,         // fwd CG limit at 3100 lbs
  fwd36:81.0,         // fwd CG limit at 3600 lbs
  aft:87.7,           // aft CG limit all weights
  wBreak:1406.1,      // 3100 lbs breakpoint
  macLE:66.7,
  macLen:65.3,
  bew:1012,           // default BEW (typical for E-500)
  bewArm:77.2
};

// EASA standard masses for 1-5 pax seat aircraft (AMC1 CAT.POL.MAA.100)
const EASA_CREW=85;    // flight crew member
const EASA_MALE=104;   // male adult incl hand baggage
const EASA_FEMALE=86;  // female adult incl hand baggage
const EASA_CHILD=35;   // child 2-12 years

function fwdLim(w){
  if(w<=AFM.wBreak)return AFM.fwd31;
  if(w>=AFM.maxTOKg)return AFM.fwd36;
  return AFM.fwd31+((w-AFM.wBreak)/(AFM.maxTOKg-AFM.wBreak))*(AFM.fwd36-AFM.fwd31);
}
function toMAC(c){return((c-AFM.macLE)/AFM.macLen)*100}
function inEnv(w,c){
  if(w<100)return null;
  return c>=fwdLim(w)&&c<=AFM.aft&&w<=AFM.maxTOKg;
}

// CG Envelope Chart
function Chart({conds}){
  const ref=useRef(null);
  const draw=useCallback(()=>{
    const cv=ref.current;if(!cv)return;
    const ctx=cv.getContext("2d");
    const W=cv.width=cv.offsetWidth*2,H=cv.height=cv.offsetHeight*2;
    ctx.scale(2,2);const w=W/2,h=H/2;
    ctx.clearRect(0,0,w,h);
    const p={t:30,r:15,b:40,l:50},cw=w-p.l-p.r,ch=h-p.t-p.b;
    const cMin=70,cMax=92,wMin=800,wMax=1700;
    const tX=c=>p.l+((c-cMin)/(cMax-cMin))*cw;
    const tY=wt=>p.t+ch-((wt-wMin)/(wMax-wMin))*ch;
    ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);
    ctx.strokeStyle="#e0e0e0";ctx.lineWidth=0.5;
    for(let i=72;i<=90;i+=2){ctx.beginPath();ctx.moveTo(tX(i),p.t);ctx.lineTo(tX(i),p.t+ch);ctx.stroke()}
    for(let i=900;i<=1700;i+=100){ctx.beginPath();ctx.moveTo(p.l,tY(i));ctx.lineTo(p.l+cw,tY(i));ctx.stroke()}
    // envelope
    const ev=[{c:74,w:800},{c:74,w:AFM.wBreak},{c:81,w:AFM.maxTOKg},{c:87.7,w:AFM.maxTOKg},{c:87.7,w:800}];
    ctx.beginPath();ev.forEach((e,i)=>{i===0?ctx.moveTo(tX(e.c),tY(e.w)):ctx.lineTo(tX(e.c),tY(e.w))});ctx.closePath();
    ctx.fillStyle="rgba(76,175,80,0.15)";ctx.fill();
    ctx.strokeStyle="#4caf50";ctx.lineWidth=2;ctx.stroke();
    // labels
    ctx.fillStyle="#666";ctx.font="10px Arial";ctx.textAlign="center";
    for(let i=72;i<=90;i+=2)ctx.fillText(i+"",tX(i),p.t+ch+14);
    ctx.textAlign="right";
    for(let i=900;i<=1700;i+=100)ctx.fillText(i+"",p.l-5,tY(i)+3);
    ctx.fillStyle="#888";ctx.textAlign="center";
    ctx.fillText("CG (inches aft datum)",p.l+cw/2,h-4);
    ctx.save();ctx.translate(11,p.t+ch/2);ctx.rotate(-Math.PI/2);ctx.fillText("Weight (kg)",0,0);ctx.restore();
    // points
    const col={"Ramp":"#ff9800","Take-Off":"#2196f3","Landing":"#9c27b0","Zero Fuel":"#ff5722"};
    conds.forEach(d=>{
      if(!d.w||!d.c||d.w<100)return;
      const x=tX(d.c),y=tY(d.w),cc=col[d.l]||"#333";
      ctx.fillStyle=cc;ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle="#fff";ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle=cc;ctx.font="bold 9px Arial";ctx.textAlign="left";
      ctx.fillText(d.l,x+8,y+3);
    });
    // MTOW line
    ctx.setLineDash([5,3]);ctx.strokeStyle="#f44336";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(p.l,tY(AFM.maxTOKg));ctx.lineTo(p.l+cw,tY(AFM.maxTOKg));ctx.stroke();
    ctx.fillStyle="#f44336";ctx.font="9px Arial";ctx.textAlign="right";
    ctx.fillText("MTOW 1633 kg",p.l+cw,tY(AFM.maxTOKg)-4);
    ctx.setLineDash([]);
  },[conds]);
  useEffect(()=>{draw()},[draw]);
  return React.createElement("canvas",{ref,style:{width:"100%",height:280,display:"block",border:"1px solid #ddd",borderRadius:6,background:"#fff"}});
}

function App(){

    // Header
    React.createElement("div",{style:{background:"#1565c0",color:"#fff",padding:"14px 16px",borderRadius:8,marginBottom:12,textAlign:"center"}},
      React.createElement("h1",{style:{margin:0,fontSize:18,fontWeight:700}},"Beechcraft Bonanza A36 — Weight & Balance Calculator"),
      React.createElement("p",{style:{margin:"4px 0 0",fontSize:12,opacity:0.85}},"S/N E-500 · Electronic Load Sheet · European CAT Operations (kg)"),
      React.createElement("p",{style:{margin:"4px 0 0",fontSize:11,opacity:0.65}},"Prepared by Ecrin İlayda Balkan")),

    // Status
    React.createElement("div",{style:{padding:"10px 16px",borderRadius:8,marginBottom:12,textAlign:"center",
      background:allOk?"#e8f5e9":"#ffebee",border:"2px solid "+(allOk?"#66bb6a":"#ef5350")}},
      React.createElement("span",{style:{fontSize:18,fontWeight:700,color:allOk?"#2e7d32":"#c62828"}},
        allOk?"✓ WITHIN LIMITS":"✗ EXCEEDS LIMITS — CHECK VALUES")),

      React.createElement("div",{style:st},"Aircraft Empty Weight"),

      React.createElement(PaxRow,{label:"Passenger 2 (rear right)",value:x2,onChange:setX2,arm:AFM.rsArm})),

      React.createElement("p",{style:{fontSize:11,color:"#999",margin:"4px 0 0",fontStyle:"italic"}},
        "Max baggage compartment load: 181 kg (400 lbs) per AFM Section II.")),

    React.createElement("div",{style:sc},

      React.createElement(NumRow,{label:"Ramp Fuel",value:fl,onChange:setFl,unit:"L",arm:AFM.fArm,max:280,step:1}),
      React.createElement("p",{style:{fontSize:12,color:"#666",margin:"2px 0 8px 183px"}},
        "= "+fk.toFixed(1)+" kg ("+(fl*0.264172).toFixed(1)+" US gal)"),
      React.createElement(NumRow,{label:"Trip Fuel (burned)",value:tl,onChange:setTl,unit:"L",arm:AFM.fArm,max:fl,step:1}),
      React.createElement("p",{style:{fontSize:12,color:"#666",margin:"2px 0 0 183px"}},

            React.createElement("tr",{style:{background:"#fff3e0",fontWeight:700}},
              React.createElement("td",null,"Zero Fuel Condition"),React.createElement("td",null,zW.toFixed(1)),

            React.createElement("tr",{style:{borderBottom:"1px solid #eee"}},
              React.createElement("td",null,"+ Fuel Loading"),React.createElement("td",null,fk.toFixed(1)),
